<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="index.css" />
  <title>Google</title>
</head>
<body>
  <div class="main-panel">
    <nav>
      <ul class="nav-header">
        <li class="nav-item">
          <a href="https://www.google.com.tr/imghp?hl=en&tab=wi">Images</a>
        </li>
        <li class="nav-item">
          <a href="https://mail.google.com/mail/?tab=wm">Gmail</a>
        </li>
        <li class="nav-item">
          <a href="https://www.google.com.tr/intl/en/about/products?tab=wh">
            <img src="assets/appsbutton.svg" alt="Apps" class="apps-icon" />
          </a>
        </li>
        <li class="user-avatar nav-item">
          <a href="https://www.github.com/insider-ilkay" target="_blank">I</a>
        </li>
      </ul>
    </nav>

    <div class="logo-container">
      <img src="assets/logo.png" width="350" alt="Google Logo" />
    </div>

    <div class="search-box">
      <div class="search-input-group">
        <div class="search-icon">
          <span>
            <svg viewBox="0 0 24 24">
              <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
          </span>
        </div>
        <div class="input-wrapper">
          <div class="input-area-wrapper">
            <input type="text" class="search-input" maxlength="2048" autofocus />
          </div>
        </div>
      </div>
      <div class="search-tools-group">
        <div class="btn-clear">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </div>
        <div class="btn-input-tool">
          <img src="//www.gstatic.com/inputtools/images/tia.png" alt="Tool" class="icon-img">
        </div>
        <div class="btn-voice-search">
          <svg class="icon" viewBox="0 0 24 24">
            <path fill="#4285f4" d="M12 15c1.66 0 3-1.31 3-2.97V5.01C15 3.35 13.66 2 12 2S9 3.34 9 5.01v7.02C9 13.69 10.34 15 12 15z"/>
            <path fill="#34a853" d="M11 18.08h2v3.92h-2z"/>
            <path fill="#fbbc04" d="M7.05 16.87C5.78 15.54 5 14.04 5 12h2c0 1.45.56 2.42 1.47 3.38v.32l-1.42 1.17z"/>
            <path fill="#ea4335" d="M12 16.93a4.97 4.97 0 01-3.54-1.55l-1.41 1.49C8.31 18.21 10.07 19 12 19c3.87 0 7-2.92 7-7h-2c0 2.92-2.24 4.93-5 4.93z"/>
          </svg>
        </div>
        <div class="btn-image-search">
          <svg class="icon" viewBox="0 0 192 192">
            <circle fill="#34a853" cx="144.07" cy="144" r="16"/>
            <circle fill="#4285f4" cx="96.07" cy="104" r="24"/>
            <path fill="#ea4335" d="M24,135.2c0,18.11,14.69,32.8,32.8,32.8H96v-16l-40.1-0.1c-8.8,0-15.9-8.19-15.9-17.9v-18H24V135.2z"/>
            <path fill="#fbbc04" d="M168,72.8c0-18.11-14.69-32.8-32.8-32.8H116l20,16c8.8,0,16,8.29,16,18v30h16V72.8z"/>
            <path fill="#4285f4" d="M112,24l-32,0L68,40H56.8C38.69,40,24,54.69,24,72.8V92h16V74c0-9.71,7.2-18,16-18h80L112,24z"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn-search">Google Search</button>
      <button class="btn-lucky">I'm Feeling Lucky</button>
    </div>

    <footer>
      <ul class="footer-nav">
        <div>
          <li class="footer-item"><a href="#">Advertising</a></li>
          <li class="footer-item"><a href="#">Business</a></li>
          <li class="footer-item"><a href="#">How Search Works</a></li>
        </div>
        <div>
          <li class="footer-item"><a href="#">Privacy</a></li>
          <li class="footer-item"><a href="#">Terms</a></li>
          <li class="footer-item"><a href="#">Settings</a></li>
        </div>
      </ul>
    </footer>
  </div>
</body>
</html>
